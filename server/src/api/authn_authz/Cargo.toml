[package]
edition = { workspace = true }
name = "authn_authz"
publish = { workspace = true }
version = "0.1.0"

[features]
test-utils = []

[dependencies]
action-proof = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
axum-macros = { workspace = true }
base64 = { workspace = true }
hex = { workspace = true }
jsonwebtoken = "9.2.0"
jwt-authorizer = { workspace = true }
once_cell = { workspace = true }
secp256k1 = { version = "0.29.0", features = ["hashes", "recovery", "serde"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true, features = ["base64"] }
sha2 = { workspace = true }
tracing = { workspace = true }
utoipa = { workspace = true }
wsm-rust-client = { workspace = true }

# path dependencies
account = { workspace = true }
bdk_utils = { workspace = true }
errors = { workspace = true }
feature_flags = { workspace = true }
http_server = { workspace = true }
instrumentation = { workspace = true }
types = { workspace = true, features = ["account", "authn_authz"] }
userpool = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
tower = { workspace = true, features = ["util"] }

[lints]
workspace = true
