[package]
edition = { workspace = true }
name = "bdk_utils"
publish = { workspace = true }
version = "0.1.0"

[dependencies]
anyhow = { workspace = true }
bdk_bitcoind_rpc = { workspace = true }
bdk_electrum = { workspace = true, features = ["use-rustls-ring"] }
bdk_wallet = { workspace = true, features = ["all-keys", "std"] }
crypto = { workspace = true, features = ["chaincode_delegation"] }
feature_flags = { workspace = true }
hex = { workspace = true }
once_cell = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

# path dependencies
errors = { workspace = true }
instrumentation = { workspace = true }

[dev-dependencies]
bdk_wallet = { workspace = true, features = [
  "all-keys",
  "keys-bip39",
  "std",
  "test-utils",
] }
rstest = { workspace = true }

[features]
test-helpers = ["bdk_wallet/test-utils"]

[lints]
workspace = true
